name: Release

# 触发方式：推送 v 开头的标签（如 v0.1.2），或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 确保不会并发运行多个 release 任务
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- 源码分发包 ----------
  build-source:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUN_VERSION: 1.3.5

    steps:
      # 检出源码
      - name: Checkout
        uses: actions/checkout@v5

      # 安装 Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # 可选：验证依赖能正常安装（打包本身不需要 node_modules）
      - name: Verify install
        run: bun install --frozen-lockfile

      # 运行打包脚本
      - name: Build release package
        shell: bash
        run: bash scripts/package-release.sh
        env:
          DIST_DIR: ${{ github.workspace }}/dist
          REQUIRE_WINDOWS_BUN: "1"

      # 上传产物（供 release job 汇总）
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: spark-code-source-release
          path: dist/*
          retention-days: 1

  # ---------- Windows EXE ----------
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      BUN_VERSION: 1.3.5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Install app dependencies
        shell: bash
        working-directory: sparkcode-app
        run: bun install --frozen-lockfile

      - name: Build Windows installer
        shell: bash
        working-directory: sparkcode-app
        run: bun run tauri build -- --bundles nsis

      - name: Collect Windows EXE
        shell: bash
        run: |
          mkdir -p dist
          shopt -s nullglob
          cp sparkcode-app/src-tauri/target/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          cp sparkcode-app/src-tauri/target/release/*.exe dist/ 2>/dev/null || true
          ls -lah dist
          test "$(find dist -maxdepth 1 -name '*.exe' -type f | wc -l)" -gt 0

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v7
        with:
          name: spark-code-windows-exe
          path: dist/*.exe
          retention-days: 1

  # ---------- 汇总所有产物并创建 GitHub Release ----------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-source, build-windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      # 创建 GitHub Release 并上传所有产物
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
