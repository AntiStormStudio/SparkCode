name: Build

# 每次 push 和 PR 时运行，验证项目能正常安装和启动
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 避免并发浪费资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify version command
        run: bun run ./src/dev-entry.ts --version

      - name: Verify package script
        shell: bash
        run: |
          bash scripts/package-release.sh
          ls -lah dist/
        env:
          DIST_DIR: ${{ github.workspace }}/dist
