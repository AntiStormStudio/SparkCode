<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Spark Code"
    />
    <link rel="icon" type="image/png" href="./spark_logo.png" />
    <title>Spark Code</title>
    <script>
      window.__sparkCodeBootError = function (message) {
        var status = document.querySelector("[data-boot-status]");
        if (status) status.textContent = message;
      };
      window.addEventListener("error", function (event) {
        window.__sparkCodeBootError("前端启动失败：" + (event.message || "未知错误"));
      });
      window.addEventListener("unhandledrejection", function (event) {
        var reason = event.reason;
        var message = reason && reason.message ? reason.message : String(reason || "未知错误");
        window.__sparkCodeBootError("前端启动失败：" + message);
      });
      window.addEventListener("spark-code-mounted", function () {
        window.__sparkCodeMounted = true;
      });
      window.setTimeout(function () {
        if (window.__sparkCodeMounted) return;
        window.__sparkCodeBootError("前端资源加载超时，正在尝试重新加载");
        window.setTimeout(function () {
          if (!window.__sparkCodeMounted) window.location.reload();
        }, 800);
      }, 2500);
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 42%, rgba(100, 214, 159, 0.16), transparent 34%),
          linear-gradient(145deg, #101111 0%, #171818 54%, #0d0f0f 100%);
      }

      .boot-splash {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        color: #f3f4f1;
        font-family: "SF Pro Text", "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      .boot-splash-inner {
        display: grid;
        justify-items: center;
        gap: 16px;
        animation: bootEnter 520ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .boot-logo {
        position: relative;
        display: grid;
        place-items: center;
        width: 96px;
        height: 96px;
      }

      .boot-logo::before {
        content: "";
        position: absolute;
        inset: 4px;
        border-radius: 26px;
        background: rgba(100, 214, 159, 0.12);
        filter: blur(18px);
        animation: bootGlow 1.65s ease-in-out infinite;
      }

      .boot-logo img {
        position: relative;
        width: 66px;
        height: 66px;
        object-fit: contain;
        animation: bootLogoGlow 1.65s ease-in-out infinite;
      }

      .boot-title {
        display: grid;
        gap: 5px;
        text-align: center;
      }

      .boot-title strong {
        color: #64d69f;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
      }

      .boot-title span {
        color: rgba(236, 239, 243, 0.66);
        font-size: 13px;
        font-weight: 600;
      }

      @keyframes bootEnter {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes bootGlow {
        0% {
          opacity: 0;
          transform: scale(0.88);
        }
        55% {
          opacity: 1;
          transform: scale(1.08);
        }
        100% {
          opacity: 0.74;
          transform: scale(1);
        }
      }

      @keyframes bootLogoGlow {
        0% {
          opacity: 0.42;
          filter: brightness(0.62) drop-shadow(0 0 0 rgba(100, 214, 159, 0));
        }
        55% {
          opacity: 1;
          filter: brightness(1.16) drop-shadow(0 0 22px rgba(100, 214, 159, 0.72));
        }
        100% {
          opacity: 0.9;
          filter: brightness(1) drop-shadow(0 0 14px rgba(100, 214, 159, 0.42));
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-splash" aria-label="Spark Code 正在启动">
        <section class="boot-splash-inner">
          <div class="boot-logo">
            <img alt="Spark" src="./spark_logo.png" />
          </div>
          <div class="boot-title">
            <strong>SPARK CODE</strong>
            <span data-boot-status>正在启动本地运行时</span>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
